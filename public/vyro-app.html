    <style id="vyro-light-override">
      /* VYRO Light Mode Override Tokens */
      :root, .dark {

        --vyro-surface: #F5F5F7;
        --vyro-positive: #34C759;
        --vyro-spatial: #007AFF;
        --vyro-alert: #FF3B30;

        --foreground: 0 0% 7% !important;

        --card-foreground: 0 0% 7% !important;
        --card-border: 240 5% 90% !important;

        --popover: 0 0% 100% !important;
        --popover-foreground: 0 0% 7% !important;
        --muted: 240 5% 96% !important;

        --secondary: 240 5% 96% !important;
        --secondary-foreground: 0 0% 7% !important;
        --accent: 240 5% 96% !important;
        --accent-foreground: 0 0% 7% !important;
        --primary: 211 100% 50% !important;
        --primary-foreground: 0 0% 100% !important;
        --sidebar: 0 0% 100% !important;
        --sidebar-foreground: 0 0% 7% !important;
        --sidebar-border: 240 5% 90% !important;
        --button-outline: rgba(0,0,0,.08) !important;
        --badge-outline: rgba(0,0,0,.06) !important;
        --elevate-1: rgba(0,0,0,.03) !important;
        --elevate-2: rgba(0,0,0,.06) !important;
        /* VYRO semantic ring tokens — must be HSL components (no hsl() wrapper) */
        --vyro-teal: 145 64% 49%   !important; /* recovery green #34C759 */
        --vyro-blue: 211 100% 50%  !important; /* spatial / agility / sleep */
        --vyro-red:    4 100% 59%  !important; /* fatigue alert #FF3B30 */
        --vyro-amber: 36 100% 50%  !important; /* warning amber */
      }
      html, body, #root { background: var(--vyro-canvas) !important; color: #111 !important; }
      /* Neutralize the prototype's dark surfaces to the new bento system */
      .bg-black, .bg-black\/80, .bg-black\/70, .bg-black\/60, .bg-black\/50, .bg-black\/40,

        -webkit-backdrop-filter: saturate(180%) blur(28px);
        backdrop-filter: saturate(180%) blur(28px);
        border-top: 1px solid rgba(0,0,0,0.06) !important;
        color: #111 !important;
        padding: 8px 14px max(env(safe-area-inset-bottom), 14px) !important;
      }
      body > div > nav:last-of-type button,
      [class*="fixed bottom-0"] button {
        background: transparent !important;
        box-shadow: none !important;
        border: 0 !important;
        gap: 4px !important;
        font-size: 10px !important;
        font-weight: 600 !important;
        letter-spacing: 0 !important;
        text-transform: none !important;
        color: #8a8f98 !important;
      }
      body > div > nav:last-of-type button[aria-selected="true"],
      body > div > nav:last-of-type button.active,
      body > div > nav:last-of-type button[data-active="true"] {
        color: var(--vyro-positive) !important;
      }
      body > div > nav:last-of-type button svg,
      body > div > nav:last-of-type button img {
        width: 22px !important; height: 22px !important;
      }

      /* === Top header — clean iOS, no chrome === */
      header {
        background: rgba(255,255,255,0.86) !important;
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        backdrop-filter: saturate(180%) blur(20px);
        border: 0 !important;
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
        box-shadow: none !important;
        color: #111 !important;
        padding: 2px 12px !important;
        min-height: 0 !important;
      }
      header img { max-height: 29px !important; width: auto !important; filter: none !important; }
      header button, header [role="button"] {
        padding: 3px 9px !important;
        font-size: 10px !important;
        line-height: 1.2 !important;
      }
      header * { color: #111 !important; }

      /* Hide bottom dock text labels — icons only */
      body > div > nav:last-of-type *,
      [class*="fixed bottom-0"] * {
        font-size: 0 !important;
        color: transparent !important;
      }
      body > div > nav:last-of-type svg,
      body > div > nav:last-of-type img,
      [class*="fixed bottom-0"] svg,
      [class*="fixed bottom-0"] img {
        font-size: 12px !important;
        color: inherit !important;
      }
      body > div > nav:last-of-type [aria-selected="true"] svg,
      body > div > nav:last-of-type .active svg,
      body > div > nav:last-of-type [data-active="true"] svg {
        color: var(--vyro-positive) !important;
      }

      /* Module rail nav (first nav) */
      body > div > nav:first-of-type {
        background: transparent !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        border: 0 !important;
      }
      body > div > nav:first-of-type button {
        background: #fff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
        border-radius: 999px !important;
        color: #111 !important;
        box-shadow: 0 1px 2px rgba(0,0,0,0.03) !important;
      }

      /* Main canvas */
      main { background: var(--vyro-canvas) !important; }
      main p { color: #6b7280 !important; }



      /* iOS-style refinements: softer surfaces, hairline borders, gentle shadows */
      .rounded-xl, .rounded-2xl, .rounded-3xl {
        border-radius: 18px !important;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 6px 20px -8px rgba(0,0,0,0.08) !important;
      }
      button, [role="button"] { transition: transform .15s ease, opacity .15s ease; }
      button:active, [role="button"]:active { transform: scale(0.97); opacity: .9; }
      .bg-neutral-800, .bg-zinc-800, .bg-slate-800, .bg-gray-800, .bg-white\/5, .bg-white\/10 {
        background-color: var(--vyro-surface) !important;
      }
      .text-white, .text-neutral-100, .text-neutral-200, .text-zinc-100, .text-slate-100, .text-gray-100 {
        color: #111 !important;
      }
      .text-neutral-300, .text-neutral-400, .text-zinc-400, .text-slate-400, .text-gray-400, .text-white\/60, .text-white\/70, .text-white\/80 {
        color: #6b7280 !important;
      }
      .border-white\/5, .border-white\/10, .border-white\/20, .border-neutral-800, .border-zinc-800, .border-slate-800, .border-gray-800 {
        border-color: rgba(0,0,0,0.08) !important;
      }
      /* Brand accents → VYRO palette */
      .text-emerald-400, .text-emerald-500, .text-green-400, .text-green-500, .text-teal-400 { color: var(--vyro-positive) !important; }
      .bg-emerald-500, .bg-emerald-400, .bg-green-500, .bg-green-400 { background-color: var(--vyro-positive) !important; }
      .text-sky-400, .text-blue-400, .text-blue-500, .text-cyan-400 { color: var(--vyro-spatial) !important; }
      .bg-sky-500, .bg-blue-500, .bg-blue-400 { background-color: var(--vyro-spatial) !important; }
      .text-red-400, .text-red-500, .text-rose-400, .text-rose-500 { color: var(--vyro-alert) !important; }
      .bg-red-500, .bg-rose-500 { background-color: var(--vyro-alert) !important; }

      /* Dial / gauge SVG strokes — prototype uses white on dark; recolor for light bento */
      svg circle[stroke="white"], svg circle[stroke="#fff"], svg circle[stroke="#FFFFFF"],
      svg path[stroke="white"], svg path[stroke="#fff"], svg path[stroke="#FFFFFF"] {
        stroke: var(--vyro-spatial) !important;
      }
      /* Dial track rings (low-opacity white) become subtle gray */
      svg [stroke-opacity], svg circle[stroke-opacity] { stroke-opacity: 1 !important; }
      svg circle[stroke="rgba(255,255,255,0.1)"], svg circle[stroke="rgba(255,255,255,0.08)"],
      svg circle[stroke="rgba(255,255,255,0.15)"], svg circle[stroke="rgba(255,255,255,0.2)"] {
        stroke: rgba(0,0,0,0.08) !important;
      }
      /* Pill chrome — translucent white pills become surface chips */
      .bg-white\/5, .bg-white\/10, .bg-white\/15, .bg-white\/20 {
        background-color: var(--vyro-surface) !important;
      }
      .ring-white\/10, .ring-white\/15, .ring-white\/20 { --tw-ring-color: rgba(0,0,0,0.06) !important; }

      /* Standardized bento curvature */
      .rounded-2xl, .rounded-3xl { border-radius: 1.5rem !important; }

      /* Slim scrollbar */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { scrollbar-width: none; }
    </style>

    <script>
      // Hide fake iOS status bar (9:41 / LTE) and the Goodix vitals caption.
      // Runs after React mounts; no observer to avoid re-render loops.
      window.addEventListener('load', function () {
        var KILL = [
          /^\s*9:41\s*$/,
          /^\s*LTE\s*[·•]?\s*\d+%\s*$/i,
          /Goodix\s*GH3026/i,
          /6[\s-]*axis\s*IMU/i,
          /Vitals\s*[—–-]\s*live\s*from/i,
          /^\s*VYRO\s*iOS\s*$/i,
          /^\s*RC\s*$/
        ];
        var DOCK_LABELS = /^\s*(Athlete|Sport|Recovery|Sleep)\s*$/;
        ];
        function pass() {
          var w = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null);
          var n, hits = [];
          while ((n = w.nextNode())) {
            var t = n.textContent || '';
            for (var i = 0; i < KILL.length; i++) {
              if (KILL[i].test(t)) { hits.push(n); break; }
            }
          }
          hits.forEach(function (node) {
            var el = node.parentElement;
            if (el) el.style.display = 'none';
          });
        }
        // Run a few times as React hydrates / streams in
        setTimeout(pass, 100);
        setTimeout(pass, 500);
        setTimeout(pass, 1500);
      });
    </script>
